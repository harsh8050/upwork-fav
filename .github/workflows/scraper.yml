name: Run Upwork Scraper

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    env:
      CI: "true"
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASS: ${{ secrets.DB_PASS }}
      DB_NAME: ${{ secrets.DB_NAME }}
      UPWORK_EMAIL: ${{ secrets.UPWORK_EMAIL }}
      UPWORK_PASSWORD: ${{ secrets.UPWORK_PASSWORD }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libnss3 libatk-bridge2.0-0 libgtk-3-0 libgbm-dev

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scripts
        run: |
          xvfb-run --auto-servernum python upwork_fav/upwork_profile_fav_with_logging.py
          xvfb-run --auto-servernum python upwork_fav/upwork_profile_fav_without_logging.py
